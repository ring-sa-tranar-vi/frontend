name: 'PR Checks'


on:
  pull_request:
    branches:
      - main


jobs:
  linting:
    name: 'Run linter and fix'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Fix linting
        run: npx oxlint --fix
