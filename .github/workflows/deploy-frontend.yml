name: 'Frontend CI/CD'

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: 'ringsatranarvi'
  STAGING_API_URL: 'https://staging-backend-service-49973934534.europe-west3.run.app'
  PRODUCTION_API_URL: 'https://prod-backend-service-49973934534.europe-west3.run.app'

jobs:
  deploy-staging:
    name: 'Deploy to Staging'
    runs-on: ubuntu-latest
    environment:
      name: 'staging'
      url: 'https://staging-ringsatranarvi-app.web.app'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ env.STAGING_API_URL }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (Staging)
        run: firebase deploy --only hosting --project ${{ env.PROJECT_ID }} --site staging-ringsatranarvi-app

  deploy-production:
    name: 'Deploy to Production'
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: 'production'
      url: 'https://prod-ringsatranarvi-app.web.app'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ env.PRODUCTION_API_URL }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (Production)
        run: firebase deploy --only hosting --project ${{ env.PROJECT_ID }} --site prod-ringsatranarvi-app
